    function unlock() {
      const pass = document.getElementById('pass').value;
      try {
        const bytes = CryptoJS.AES.decrypt(encryptedPayload, pass);
        const originalCode = bytes.toString(CryptoJS.enc.Utf8);

        if (!originalCode) throw new Error(); 

        document.open();
        document.write(originalCode);
        document.close();
      } catch (e) {
        document.getElementById('error').style.display = 'block';
      }
    }
